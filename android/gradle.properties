org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8 -Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3 -Dhttps.connectionTimeout=180000 -Dhttps.socketTimeout=180000
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=false

# 禁用 Gradle 守护进程，避免缓存问题
org.gradle.daemon=false

# 网络重试配置
systemProp.http.connectionTimeout=180000
systemProp.http.socketTimeout=180000
systemProp.https.connectionTimeout=180000
systemProp.https.socketTimeout=180000
