name: Build Linux arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev unzip \
            libasound2-dev rpm patchelf libmpv-dev webkit2gtk-4.1 \
            gcc g++ autoconf automake debhelper glslang-dev ladspa-sdk xutils-dev \
            libarchive-dev libbluray-dev libbs2b-dev libcaca-dev libcdio-paranoia-dev libdrm-dev \
            libdav1d-dev libdvdnav-dev libegl1-mesa-dev libepoxy-dev libfontconfig-dev libfreetype6-dev \
            libfribidi-dev libgl1-mesa-dev libgbm-dev libgme-dev libgsm1-dev libharfbuzz-dev libjpeg-dev \
            libbrotli-dev liblcms2-dev libmodplug-dev libmp3lame-dev libopenal-dev \
            libopus-dev libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev librtmp-dev \
            libsdl2-dev libsixel-dev libssh-dev libsoxr-dev libspeex-dev libtool \
            libv4l-dev libva-dev libvdpau-dev libvorbis-dev libvo-amrwbenc-dev \
            libunwind-dev libvpx-dev libwayland-dev libx11-dev libxext-dev \
            libxkbcommon-dev libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
            linux-libc-dev nasm pkg-config python3 wget curl git powershell

      - name: Install Flutter
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.4-stable.tar.xz
          tar xf flutter_linux_3.44.4-stable.tar.xz
          rm flutter_linux_3.44.4-stable.tar.xz
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          flutter config --enable-linux-desktop
          flutter --version

      - name: Build app
        run: |
          powershell -Command 'lib/scripts/build.ps1'
          powershell -Command 'lib/scripts/patch.ps1 Linux'
          flutter build linux --release --pub --dart-define-from-file=pili_release.json