# PiliPlus 项目环境配置
# 更新日期: 2026-04-30
# 版本: 2.0.6

---
project:
  name: PiliPlus
  type: flutter_android
  root_path: c:\traeapp\PiliPlusgzy622Mod
  version: 2.0.6+1

environment:
  os:
    type: windows
    minimum_version: "10"
    
  required_variables:
    - name: ANDROID_HOME
      value: "c:\\traeapp\\PiliPlusgzy622Mod\\.android-sdk"
      
    - name: ANDROID_SDK_ROOT
      value: "c:\\traeapp\\PiliPlusgzy622Mod\\.android-sdk"
      
    - name: JAVA_TOOL_OPTIONS
      value: "-Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3"
      critical: true

sdks:
  flutter:
    version: "3.41.6"
    management: fvm
    
    fvm_paths:
      executable: "C:\\Users\\VG622\\AppData\\Local\\Pub\\Cache\\bin\\fvm.bat"
      flutter_binary: "C:\\Users\\VG622\\fvm\\versions\\3.41.6\\bin\\flutter.bat"
      dart_binary: "C:\\Users\\VG622\\fvm\\versions\\3.41.6\\bin\\dart.bat"
      
    dart_sdk:
      minimum_version: ">=3.10.0"
      
  android:
    sdk_path: "c:\\traeapp\\PiliPlusgzy622Mod\\.android-sdk"
    compile_sdk: 35
    target_sdk: 35
    min_sdk: 21
    
    ndk:
      required: true
      version: "28.2.13676358"
      
  java:
    version: "17"
    source_compatibility: "VERSION_17"
    target_compatibility: "VERSION_17"
    kotlin_jvm_target: "JVM_17"

build_tools:
  gradle:
    plugin_version: "8.12.1"
    kotlin_version: "2.2.20"
    
  mirrors:
    - name: 阿里云 Google
      url: "https://maven.aliyun.com/repository/google"
    - name: 阿里云 Public
      url: "https://maven.aliyun.com/repository/public"
    - name: 阿里云 Gradle Plugin
      url: "https://maven.aliyun.com/repository/gradle-plugin"
    - name: 阿里云 Central
      url: "https://maven.aliyun.com/repository/central"

dependencies:
  flutter:
    config_file: "pubspec.yaml"
    lock_file: "pubspec.lock"
    
    categories:
      - name: 状态管理
        packages: [get]
      - name: 网络
        packages: [dio, cookie_jar, connectivity_plus]
      - name: 视频播放
        packages: [media_kit, media_kit_video, media_kit_libs_video]
      - name: 存储
        packages: [path_provider, hive_ce]
      - name: UI组件
        packages: [dynamic_color, flutter_smart_dialog, canvas_danmaku]
        
    git_dependencies:
      - name: get
        url: "https://github.com/bggRGjQaUbCoE/getx.git"
        ref: "version_4.7.2"
      - name: media_kit
        url: "https://github.com/My-Responsitories/media-kit.git"
        ref: "version_1.2.5"

devices:
  adb:
    path: "c:\\traeapp\\PiliPlusgzy622Mod\\.android-sdk\\platform-tools\\adb.exe"
    
  package_names:
    debug: "com.example.piliplus.debug"
    release: "com.example.piliplus"
    
  main_activity: "com.example.piliplus.MainActivity"

build:
  output_paths:
    debug_apk: "build/app/outputs/flutter-apk/app-debug.apk"
    release_apk: "build/app/outputs/flutter-apk/app-release.apk"
    
  commands:
    debug: '& "C:\Users\VG622\fvm\versions\3.41.6\bin\flutter.bat" build apk --debug'
    release: '& "C:\Users\VG622\fvm\versions\3.41.6\bin\flutter.bat" build apk --release --obfuscate --split-debug-info=build/debug_info'
    clean: '& "C:\Users\VG622\fvm\versions\3.41.6\bin\flutter.bat" clean'
    pub_get: '& "C:\Users\VG622\fvm\versions\3.41.6\bin\flutter.bat" pub get'
    
  install:
    debug: 'adb install -r build/app/outputs/flutter-apk/app-debug.apk'
    release: 'adb install -r build/app/outputs/flutter-apk/app-release.apk'
    
  launch: 'adb shell am start -n com.example.piliplus.debug/com.example.piliplus.MainActivity'

known_issues:
  - id: ISSUE_001
    name: "Dart SDK 版本不匹配"
    symptom: "Because PiliPlus requires SDK version >=3.10.0, version solving failed"
    solution: "使用 FVM Flutter 3.41.6"
    
  - id: ISSUE_002
    name: "TLS 握手失败"
    symptom: "The server may not support the client's requested TLS protocol versions"
    solution: "设置 JAVA_TOOL_OPTIONS 环境变量"
    critical: true
    
  - id: ISSUE_003
    name: "R8 混淆失败"
    symptom: "Missing class com.google.android.play.core.splitcompat.SplitCompatApplication"
    solution: "已修复 - 添加 Play Core ProGuard 规则到 android/app/proguard-rules.pro"
    
  - id: ISSUE_004
    name: "NDK 未找到"
    symptom: "NDK at [path] did not have a source.properties file"
    solution: "删除 NDK 目录并重新安装: sdkmanager --install ndk;28.2.13676358"

agent_guidelines:
  pre_build_required:
    - "设置 JAVA_TOOL_OPTIONS 环境变量"
    - "验证使用 FVM Flutter 而非系统 Flutter"
    - "检查设备连接状态"
    
  build_template: |
    $env:JAVA_TOOL_OPTIONS="-Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3"
    $env:ANDROID_HOME="c:\traeapp\PiliPlusgzy622Mod\.android-sdk"
    $env:ANDROID_SDK_ROOT="c:\traeapp\PiliPlusgzy622Mod\.android-sdk"
    & "C:\Users\VG622\fvm\versions\3.41.6\bin\flutter.bat" build apk --release --obfuscate --split-debug-info=build/debug_info
    
  prohibited_actions:
    - "不要使用系统 Flutter"
    - "不要修改已配置的阿里云镜像"
    - "不要跳过 JAVA_TOOL_OPTIONS 设置"
