name: Build Linux arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build Docker image
        run: docker build --platform linux/arm64 -t piliplus-arm64 -f Dockerfile.arm64 .

      - name: Build Flutter app
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$(pwd):/workspace" \
            -w /workspace \
            piliplus-arm64 \
            bash -c "flutter --version && powershell -Command 'lib/scripts/build.ps1' && powershell -Command 'lib/scripts/patch.ps1 Linux' && flutter build linux --release --pub --dart-define-from-file=pili_release.json"